services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: cakeshop-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cookieshop
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/init.sql:ro
    networks:
      - cakeshop-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --character-set-client-handshake=FALSE

  # CakeShop 应用服务
  cakeshop:
    build: .
    container_name: cakeshop-app
    restart: always
    environment:
      SERVER_PORT: 8090
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cookieshop?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_INITIALIZATION_MODE: never
      ARK_API_KEY: ${ARK_API_KEY}
    ports:
      - "8090:8090"
    depends_on:
      - mysql
    networks:
      - cakeshop-network

volumes:
  mysql-data:

networks:
  cakeshop-network:
    driver: bridge
