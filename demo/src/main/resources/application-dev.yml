# ── 开发环境配置：H2 内存数据库，零依赖启动 ──
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:cookieshop;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    initialization-mode: always
    schema: classpath:schema-h2.sql
    data: classpath:data-h2.sql
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
