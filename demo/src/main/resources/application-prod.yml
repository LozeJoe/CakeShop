# ── 生产环境配置：MySQL 数据库（Docker Compose 部署）──
spring:
  messages:
    basename: messages
    encoding: UTF-8
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/cookieshop?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    initialization-mode: never
  thymeleaf:
    cache: true
    encoding: UTF-8
    mode: HTML

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ── AI 客服 火山方舟 API 配置 ──
ark:
  api:
    url: https://ark.cn-beijing.volces.com/api/v3/chat/completions
    key: ${ARK_API_KEY}
    model: ep-20260623134604-xrmhh
