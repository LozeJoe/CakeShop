server:
  port: 8090
  tomcat:
    uri-encoding: UTF-8

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3308/cookieshop?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    initialization-mode: always
    sql-script-encoding: UTF-8
  
  thymeleaf:
    cache: false
    encoding: UTF-8
    mode: HTML
  
  mvc:
    hiddenmethod:
      filter:
        enabled: true
    throw-exception-if-no-handler-found: true
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  
mybatis:
  type-aliases-package: com.javaBean
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

deepseek:
  api:
    url: https://api.deepseek.com/v1/chat/completions
    key: ${DEEPSEEK_API_KEY}
    model: deepseek-chat

logging:
  level:
    '[com.mapper]': debug
