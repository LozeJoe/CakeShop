<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<!-- Apple 风格 — 管理后台公共组件 -->

<nav class="admin-sidebar" th:fragment="sidebar">
    <h2 style="font-family:'Playfair Display',serif;" th:text="${siteName}">CakeShop</h2>
    <ul>
        <li><a href="/admin/index" th:classappend="${sidebarActive == 'index' ? 'active' : ''}">📊 <span th:text="#{admin.dashboard}">Dashboard</span></a></li>
        <li th:if="${adminRole == 'super_admin'}"><a href="/admin/users" th:classappend="${sidebarActive == 'users' ? 'active' : ''}">👥 <span th:text="#{admin.users}">Users</span></a></li>
        <li><a href="/admin/goods" th:classappend="${sidebarActive == 'goods' ? 'active' : ''}">🎂 <span th:text="#{admin.goods}">Products</span></a></li>
        <li><a href="/admin/orders" th:classappend="${sidebarActive == 'orders' ? 'active' : ''}">📦 <span th:text="#{admin.orders}">Orders</span></a></li>
        <li th:if="${adminRole == 'super_admin'}"><a href="/admin/types" th:classappend="${sidebarActive == 'types' ? 'active' : ''}">🏷️ <span th:text="#{admin.types}">Categories</span></a></li>
        <li th:if="${adminRole == 'super_admin'}"><a href="/admin/settings" th:classappend="${sidebarActive == 'settings' ? 'active' : ''}">⚙️ <span th:text="#{admin.settings}">Settings</span></a></li>
        <li th:if="${adminRole == 'super_admin'}"><a href="/admin/logs" th:classappend="${sidebarActive == 'logs' ? 'active' : ''}">📋 <span th:text="#{admin.logs}">Logs</span></a></li>
        <li><a href="/admin/reviewAudit" th:classappend="${sidebarActive == 'reviews' ? 'active' : ''}">📝 <span th:text="#{review.audit}">Reviews</span></a></li>
        <li style="margin-top:20px;border-top:1px solid rgba(255,255,255,.08);padding-top:16px;">
            <a href="/goods/goodList"><span th:text="#{admin.back}">← Back to Shop</span></a>
        </li>
        <li>
            <a href="?lang=zh" style="display:inline-block;width:48%;text-align:center;padding:8px 0;font-size:12px;" th:classappend="${#locale.language=='zh'?'active':''}">中文</a>
            <a href="?lang=en" style="display:inline-block;width:48%;text-align:center;padding:8px 0;font-size:12px;" th:classappend="${#locale.language=='en'?'active':''}">EN</a>
        </li>
        <li><button class="theme-toggle" id="themeToggle" style="width:100%;text-align:left;padding:11px 20px;" th:text="#{admin.themeDark}">🌙 Dark Mode</button></li>
    </ul>
    <script th:inline="javascript">
    (function(){
        var t=document.getElementById('themeToggle');
        var h=document.documentElement;
        var themeDark = /*[[#{admin.themeDark}]]*/'🌙 Dark Mode';
        var themeLight = /*[[#{admin.themeLight}]]*/'☀️ Light Mode';
        if(localStorage.getItem('theme')==='dark'){h.setAttribute('data-theme','dark');if(t)t.textContent=themeLight;}
        if(t)t.addEventListener('click',function(){
            if(h.getAttribute('data-theme')==='dark'){h.removeAttribute('data-theme');t.textContent=themeDark;localStorage.setItem('theme','light');}
            else{h.setAttribute('data-theme','dark');t.textContent=themeLight;localStorage.setItem('theme','dark');}
        });
    })();
    </script>
</nav>

<header class="admin-header" th:fragment="header">
    <h1 th:text="${pageTitle}"></h1>
    <div th:if="${headerExtra != null}" th:utext="${headerExtra}"></div>
</header>
</html>
