<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品编辑 — CakeShop</title>
    <link rel="icon" type="image/jpeg" th:href="@{/images/logo.jpg}">
    <link type="text/css" rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="page-container">
        <div th:replace="admin/commons::sidebar"></div>
        <div class="main-content">
            <header th:replace="admin/commons::header"></header>
            <div class="form-container">
                <form th:action="@{/admin/goodsSave}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:name="id" th:value="${goods != null ? goods.id : 0}">
                    <div class="form-group"><label>商品名称</label><input type="text" name="name" th:value="${goods != null ? goods.name : ''}" required></div>
                    <div class="form-group"><label>所属分类</label>
                        <select name="typeId" required>
                            <option value="">请选择</option>
                            <option th:each="type : ${typeList}" th:value="${type.id}" th:text="${type.name}" th:selected="${goods != null && goods.typeId == type.id}"></option>
                        </select>
                    </div>
                    <div class="form-group"><label>价格</label><input type="number" name="price" th:value="${goods != null ? goods.price : ''}" step="0.01" required></div>
                    <div class="form-group"><label>库存</label><input type="number" name="stock" th:value="${goods != null ? goods.stock : ''}" required></div>
                    <div class="form-group"><label>简介</label><textarea name="intro" required th:text="${goods != null ? goods.intro : ''}"></textarea></div>
                    <div class="form-group"><label>封面图片</label><input type="file" name="coverFile" accept="image/*"><p class="upload-hint">建议 400×400px</p><img th:if="${goods != null && goods.cover != null}" th:src="${goods.cover}" class="preview-img"><input type="hidden" th:name="cover" th:value="${goods != null ? goods.cover : ''}"></div>
                    <div class="form-group"><label>图片 1</label><input type="file" name="image1File" accept="image/*"><img th:if="${goods != null && goods.image1 != null}" th:src="${goods.image1}" class="preview-img"><input type="hidden" th:name="image1" th:value="${goods != null ? goods.image1 : ''}"></div>
                    <div class="form-group"><label>图片 2</label><input type="file" name="image2File" accept="image/*"><img th:if="${goods != null && goods.image2 != null}" th:src="${goods.image2}" class="preview-img"><input type="hidden" th:name="image2" th:value="${goods != null ? goods.image2 : ''}"></div>
                    <div style="display:flex;gap:12px;margin-top:28px;">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <a href="/admin/goods" class="btn btn-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
