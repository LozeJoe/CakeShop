<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品管理 — CakeShop</title>
    <link rel="icon" type="image/jpeg" th:href="@{/images/logo.jpg}">
    <link type="text/css" rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="page-container">
        <div th:replace="admin/commons::sidebar"></div>
        <div class="main-content">
            <header th:replace="admin/commons::header"></header>
            <div class="table-container">
                <table>
                    <thead><tr><th>ID</th><th>封面</th><th>名称</th><th>分类</th><th>价格</th><th>库存</th><th>简介</th><th>操作</th></tr></thead>
                    <tbody>
                        <tr th:each="goods : ${goodsList}">
                            <td th:text="${goods.id}"></td>
                            <td><img th:src="${goods.cover}" class="goods-img"></td>
                            <td style="font-weight:500;" th:text="${goods.name}"></td>
                            <td th:text="${goods.typeName != null ? goods.typeName : '—'}"></td>
                            <td>&yen;[[${#numbers.formatDecimal(goods.price, 0, 2)}]]</td>
                            <td><span th:class="${goods.stock < 10 ? 'status status-danger' : (goods.stock < 50 ? 'status status-warning' : '')}" th:text="${goods.stock}"></span></td>
                            <td th:text="${goods.intro != null ? #strings.abbreviate(goods.intro, 15) : ''}"></td>
                            <td>
                                <a th:href="@{/admin/goodsEdit(id=${goods.id})}" class="btn btn-sm btn-warning">编辑</a>
                                <a th:href="@{/admin/goodsDelete(id=${goods.id})}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除？')">删除</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="pagination">
                    <a th:href="@{/admin/goods(page=1)}" class="btn btn-sm btn-secondary" th:if="${currentPage != 1}">首页</a>
                    <span class="btn btn-sm btn-secondary" style="opacity:.3;cursor:default;" th:if="${currentPage == 1}">首页</span>
                    <a th:href="@{/admin/goods(page=${currentPage - 1})}" class="btn btn-sm btn-secondary" th:if="${currentPage != 1}">上一页</a>
                    <span class="btn btn-sm btn-secondary" style="opacity:.3;cursor:default;" th:if="${currentPage == 1}">上一页</span>
                    <a th:each="i : ${#numbers.sequence(1, totalPages)}" th:href="@{/admin/goods(page=${i})}" th:class="${i == currentPage ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-secondary'}" th:text="${i}"></a>
                    <a th:href="@{/admin/goods(page=${currentPage + 1})}" class="btn btn-sm btn-secondary" th:if="${currentPage < totalPages}">下一页</a>
                    <span class="btn btn-sm btn-secondary" style="opacity:.3;cursor:default;" th:if="${currentPage >= totalPages}">下一页</span>
                    <a th:href="@{/admin/goods(page=${totalPages})}" class="btn btn-sm btn-secondary" th:if="${currentPage < totalPages}">末页</a>
                    <span class="btn btn-sm btn-secondary" style="opacity:.3;cursor:default;" th:if="${currentPage >= totalPages}">末页</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
