<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户编辑 — CakeShop</title>
    <link rel="icon" type="image/jpeg" th:href="@{/images/logo.jpg}">
    <link type="text/css" rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="page-container">
        <div th:replace="admin/commons::sidebar"></div>
        <div class="main-content">
            <header th:replace="admin/commons::header"></header>
            <div class="form-container" style="max-width:600px;">
                <form th:action="@{/admin/userSave}" method="post">
                    <input type="hidden" th:name="id" th:value="${user != null ? user.id : 0}">
                    <div class="form-group"><label>用户名</label><input type="text" name="username" th:value="${user != null ? user.username : ''}" required></div>
                    <div class="form-group"><label>密码</label><input type="password" name="password" placeholder="新用户必填，编辑时留空则不修改" th:value="${user != null && user.id == 0 ? '' : ''}"></div>
                    <div class="form-group"><label>姓名</label><input type="text" name="name" th:value="${user != null ? user.name : ''}"></div>
                    <div class="form-group"><label>邮箱</label><input type="email" name="email" th:value="${user != null ? user.email : ''}"></div>
                    <div class="form-group"><label>电话</label><input type="tel" name="phone" th:value="${user != null ? user.phone : ''}"></div>
                    <div class="form-group"><label>地址</label><input type="text" name="address" th:value="${user != null ? user.address : ''}"></div>
                    <div class="form-group"><label>角色</label>
                        <div class="radio-group">
                            <label><input type="radio" name="isadmin" value="0" th:checked="${user == null || user.isadmin == '0'}"> 普通用户</label>
                            <label><input type="radio" name="isadmin" value="1" th:checked="${user != null && user.isadmin == '1'}"> 管理员</label>
                        </div>
                    </div>
                    <div style="display:flex;gap:12px;margin-top:28px;">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <a href="/admin/users" class="btn btn-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
