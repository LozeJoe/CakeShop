<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>购物车 — CakeShop</title>
    <link rel="icon" type="image/jpeg" th:href="@{/images/logo.jpg}">
    <link type="text/css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="user/commons::topbar"></div>
    <div th:replace="user/commons::floathome"></div>

    <div class="container">
        <div class="hero" style="padding:32px 0 24px;text-align:left;">
            <h1 style="font-size:36px;">购物车</h1>
        </div>

        <div th:if="${cartList == null or cartList.isEmpty()}" class="empty-state">
            <div class="empty-icon">🛒</div>
            <p class="empty-text">购物车是空的，去挑选美味蛋糕吧。</p>
            <a th:href="@{/goods/goodList}" class="btn btn-primary">浏览商品</a>
        </div>

        <div th:if="${cartList != null and not cartList.isEmpty()}" class="card" style="overflow:visible;">
            <table style="margin-top:0;">
                <thead>
                    <tr>
                        <th style="width:100px;">图片</th>
                        <th>名称</th>
                        <th style="width:100px;">单价</th>
                        <th style="width:140px;">数量</th>
                        <th style="width:100px;">小计</th>
                        <th style="width:80px;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cart : ${cartList}">
                        <td><img th:src="${cart.cover}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;"></td>
                        <td style="font-weight:500;" th:text="${cart.intro}"></td>
                        <td>&yen;[[${#numbers.formatDecimal(cart.price, 0, 2)}]]</td>
                        <td>
                            <div style="display:flex;align-items:center;gap:4px;">
                                <button class="btn btn-sm btn-secondary" th:onclick="'sub(' + ${cart.id} + ');'" style="min-width:32px;">−</button>
                                <span style="padding:0 12px;font-weight:600;" th:text="${cart.amount}"></span>
                                <button class="btn btn-sm btn-secondary" th:onclick="'add(' + ${cart.id} + ');'" style="min-width:32px;">+</button>
                            </div>
                        </td>
                        <td style="font-weight:600;">&yen;[[${#numbers.formatDecimal(cart.totalPrice, 0, 2)}]]</td>
                        <td><button class="btn btn-sm btn-danger" th:onclick="'deleteGood(' + ${cart.id} + ');'">删除</button></td>
                    </tr>
                </tbody>
            </table>

            <div style="display:flex;justify-content:flex-end;align-items:center;gap:24px;padding:24px 28px;border-top:1px solid #f0f0f0;">
                <span style="font-size:14px;color:var(--caramel);">合计</span>
                <span style="font-size:28px;font-weight:700;letter-spacing:-.02em;">&yen;[[${#numbers.formatDecimal(total, 0, 2)}]]</span>
                <button type="button" id="checkoutBtn" class="btn btn-primary btn-lg">去结算</button>
            </div>
        </div>
    </div>

    <div th:replace="user/commons::footbar"></div>

    <!-- 结算弹窗 -->
    <div class="modal-overlay" id="myModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>确认订单信息</h3>
                <span class="close" onclick="closeModal()">×</span>
            </div>
            <form th:action="@{/cart/pay}" method="post">
                <div class="modal-body">
                    <div class="form-group"><label>收货人</label><input type="text" name="username" required th:value="${session.user.name}" placeholder="请输入收货人"></div>
                    <div class="form-group"><label>联系电话</label><input type="tel" name="phone" required th:value="${session.user.phone}" placeholder="请输入电话"></div>
                    <div class="form-group"><label>收货地址</label><input type="text" name="address" required th:value="${session.user.address}" placeholder="请输入地址" id="addressInput"></div>
                    <div class="form-group" style="display:flex;gap:10px;">
                        <div style="flex:1;"><label>期望送达日期</label><input type="date" name="deliveryDate" id="deliveryDate" style="width:100%;"></div>
                        <div style="flex:1;"><label>期望送达时间</label><input type="time" name="deliveryTime" id="deliveryTime" value="12:00" style="width:100%;"></div>
                    </div>
                    <input type="hidden" name="latitude" id="latInput" value="0">
                    <input type="hidden" name="longitude" id="lngInput" value="0">
                    <h4 style="margin:20px 0 12px;font-size:15px;">支付方式</h4>
                    <div style="display:flex;gap:24px;">
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="radio" name="paytype" value="1" checked><span>微信支付</span>
                        </label>
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="radio" name="paytype" value="2"><span>支付宝</span>
                        </label>
                    </div>
                    <div style="margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;">
                        <span style="color:var(--caramel);">应付金额</span>
                        <span style="font-size:28px;font-weight:700;">&yen;[[${#numbers.formatDecimal(total, 0, 2)}]]</span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">确认支付</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function postForm(url, params){
            var form = document.createElement('form');
            form.method = 'POST';
            form.action = url;
            form.style.display = 'none';
            for (var key in params) {
                if (!params.hasOwnProperty(key)) continue;
                var input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = params[key];
                form.appendChild(input);
            }
            document.body.appendChild(form);
            form.submit();
        }
        function add(id){postForm('/cart/addOne', {cartId: id});}
        function sub(id){postForm('/cart/subOne', {cartId: id});}
        function deleteGood(id){if(confirm("确定删除？"))postForm('/cart/deleteCart', {cartId: id});}
        function openModal(){var m=document.getElementById('myModal');if(m){m.style.display='flex';document.body.style.overflow='hidden';}}
        function closeModal(){var m=document.getElementById('myModal');if(m){m.style.display='none';document.body.style.overflow='';}}
        document.addEventListener('DOMContentLoaded',function(){
            var b=document.getElementById('checkoutBtn');if(b)b.addEventListener('click',openModal);
            var c=document.querySelector('.modal-header .close');if(c)c.addEventListener('click',closeModal);
            var m=document.getElementById('myModal');if(m)m.addEventListener('click',function(e){if(e.target===m)closeModal();});
        });
    </script>
</body>
</html>
