<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'登录 — ' + ${siteName}">登录</title>
    <link rel="icon" type="image/jpeg" th:href="@{/images/logo.jpg}">
    <link type="text/css" rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .role-tabs{display:flex;gap:0;margin-bottom:28px;border-bottom:2px solid var(--border-light);}
        .role-tab{flex:1;text-align:center;padding:12px 0;cursor:pointer;font-size:15px;font-weight:500;color:var(--caramel);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .3s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
        .role-tab.active{color:var(--gold-dark);border-bottom-color:var(--gold-dark);font-weight:600;}
        .role-tab:hover{color:var(--chocolate);}
        .login-panel{display:none;}
        .login-panel.active{display:block;}
        .role-subtitle{font-size:12px;color:var(--caramel);text-align:center;margin-top:-20px;margin-bottom:20px;}
    </style>
</head>
<body>
    <!-- 极简登录头 -->
    <div style="text-align:center;padding:36px 0 0;">
        <a th:href="@{/goods/goodList}" style="font-family:Georgia,'Times New Roman','Songti SC',serif;font-size:32px;font-weight:700;color:var(--chocolate);text-decoration:none;" th:text="${siteName}">CakeShop</a>
    </div>

    <div class="container" style="padding-top:20px;">
        <div class="form-container" style="max-width:460px;">
            <p style="color:var(--caramel);font-size:14px;margin-bottom:8px;text-align:center;">选择身份登录</p>

            <div th:if="${success != null}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${riderError != null}" class="alert alert-danger" th:text="${riderError}"></div>

            <!-- 角色选择标签 -->
            <div class="role-tabs">
                <button class="role-tab" id="tabUser" onclick="switchRole('user')">👤 用户登录</button>
                <button class="role-tab" id="tabRider" onclick="switchRole('rider')">🛵 骑手登录</button>
            </div>

            <!-- 用户登录面板 -->
            <div class="login-panel" id="panelUser">
                <p class="role-subtitle">选购蛋糕，享受甜蜜时光</p>
                <form action="/user/login" method="post">
                    <div class="form-group">
                        <input type="text" name="userName" placeholder="用户名" required>
                    </div>
                    <div class="form-group">
                        <input type="password" name="userPassword" placeholder="密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg">登 录</button>
                </form>
                <p class="form-link">还没有账号？<a th:href="@{/user/register}">创建新账户</a></p>
            </div>

            <!-- 骑手登录面板 -->
            <div class="login-panel" id="panelRider">
                <p class="role-subtitle">接单配送，使命必达</p>
                <form th:action="@{/rider/doLogin}" method="post">
                    <div class="form-group">
                        <input type="text" name="username" placeholder="骑手账号" required>
                    </div>
                    <div class="form-group">
                        <input type="password" name="password" placeholder="骑手密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg">开 始 接 单</button>
                </form>
                <p class="form-link">还没有骑手账号？<a th:href="@{/rider/register}">注册成为骑手</a></p>
            </div>
        </div>
    </div>

    <script>
        function switchRole(role){
            document.querySelectorAll('.role-tab').forEach(function(t){t.classList.remove('active');});
            document.querySelectorAll('.login-panel').forEach(function(p){p.classList.remove('active');});
            document.getElementById('tab'+role.charAt(0).toUpperCase()+role.slice(1)).classList.add('active');
            document.getElementById('panel'+role.charAt(0).toUpperCase()+role.slice(1)).classList.add('active');
        }

        // 初始化：根据 URL 参数选择面板（?role=rider 自动切到骑手）
        (function(){
            var params = new URLSearchParams(window.location.search);
            var role = params.get('role');
            if (role === 'rider') switchRole('rider');
            else switchRole('user');
        })();
    </script>
</body>
</html>
