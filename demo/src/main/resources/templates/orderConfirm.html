<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>订单确认 — CakeShop</title>
    <link rel="icon" type="image/jpeg" th:href="@{/images/logo.jpg}">
    <link type="text/css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="user/commons::topbar"></div>
    <div th:replace="user/commons::floathome"></div>

    <div class="container" style="max-width:600px;">
        <div style="text-align:center;padding:40px 0 24px;">
            <div style="font-size:56px;margin-bottom:12px;">📋</div>
            <h1 style="font-size:28px;font-weight:700;letter-spacing:-.02em;">订单已创建</h1>
        </div>

        <div class="card" style="padding:28px;margin-bottom:24px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <span style="font-family:'SF Mono',monospace;font-size:14px;font-weight:600;" th:text="'订单号：' + ${orderId}"></span>
                <span class="status-badge status-unpaid">待支付</span>
            </div>

            <form th:action="@{/order/pay}" method="post">
                <input type="hidden" name="orderId" th:value="${orderId}">
                <h3 style="font-size:15px;font-weight:600;margin-bottom:14px;">选择支付方式</h3>
                <div style="display:flex;gap:24px;margin-bottom:24px;">
                    <label style="display:flex;align-items:center;gap:10px;padding:14px 20px;border:1.5px solid var(--gold-dark);border-radius:12px;cursor:pointer;flex:1;">
                        <input type="radio" name="paytype" value="1" checked>
                        <span style="font-weight:500;">支付宝</span>
                    </label>
                    <label style="display:flex;align-items:center;gap:10px;padding:14px 20px;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;flex:1;">
                        <input type="radio" name="paytype" value="2">
                        <span style="font-weight:500;">微信支付</span>
                    </label>
                </div>

                <div style="display:flex;justify-content:space-between;align-items:center;padding-top:20px;border-top:1px solid #f0f0f0;">
                    <span style="color:var(--caramel);">应付金额</span>
                    <span style="font-size:28px;font-weight:700;">&yen;[[${#numbers.formatDecimal(total, 0, 2)}]]</span>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:24px;">立即支付</button>
            </form>
        </div>
    </div>

    <div th:replace="user/commons::footbar"></div>
</body>
</html>
