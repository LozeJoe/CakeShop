<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>支付成功 — CakeShop</title>
    <link rel="icon" type="image/jpeg" th:href="@{/images/logo.jpg}">
    <link type="text/css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="user/commons::topbar"></div>
    <div th:replace="user/commons::floathome"></div>

    <div class="container" style="text-align:center;padding-top:80px;">
        <div style="font-size:72px;margin-bottom:20px;">✅</div>
        <h1 style="font-size:36px;font-weight:700;letter-spacing:-.02em;margin-bottom:12px;">支付成功</h1>
        <p style="font-size:17px;color:var(--caramel);margin-bottom:32px;">感谢您的购买，订单已确认。</p>

        <div class="card" style="display:inline-block;text-align:left;padding:28px 40px;margin-bottom:32px;">
            <div style="margin-bottom:8px;"><span style="color:var(--caramel);">订单号</span><span style="margin-left:12px;font-family:'SF Mono',monospace;font-weight:600;" th:text="${orderId}"></span></div>
            <div style="margin-bottom:8px;"><span style="color:var(--caramel);">支付方式</span><span style="margin-left:12px;font-weight:500;" th:text="${paytype}"></span></div>
            <div><span style="color:var(--caramel);">支付金额</span><span style="margin-left:12px;font-size:24px;font-weight:700;">&yen;[[${#numbers.formatDecimal(total, 0, 2)}]]</span></div>
        </div>

        <div style="display:flex;gap:12px;justify-content:center;">
            <a th:href="@{/order/myOrder}" class="btn btn-primary btn-lg">查看订单</a>
            <a th:href="@{/goods/goodList}" class="btn btn-secondary btn-lg">继续购物</a>
        </div>
    </div>

    <div th:replace="user/commons::footbar"></div>
</body>
</html>
