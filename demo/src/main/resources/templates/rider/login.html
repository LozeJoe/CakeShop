<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <title>骑手登录 — CakeShop</title>
    <link rel="icon" type="image/jpeg" href="/images/logo.jpg">
    <link type="text/css" rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="form-container" style="max-width:400px;">
            <h2>🛵 骑手登录</h2>
            <p style="color:var(--caramel);font-size:14px;margin-bottom:28px;">CakeShop 配送系统</p>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <form th:action="@{/rider/doLogin}" method="post">
                <div class="form-group"><input type="text" name="username" placeholder="骑手账号" required></div>
                <div class="form-group"><input type="password" name="password" placeholder="密码" required></div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">登 录</button>
            </form>
        </div>
    </div>
</body>
</html>
