<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <title>消息通知 — CakeShop</title>
    <link rel="icon" type="image/jpeg" th:href="@{/images/logo.jpg}">
    <link type="text/css" rel="stylesheet" href="/css/style.css">
    <style>
        /* 顶部 */
        .page-header{display:flex;justify-content:space-between;align-items:center;padding:16px 0;}
        .page-header h1{font-size:22px;color:var(--espresso);}
        .page-header a{font-size:12px;color:var(--caramel);}

        /* 筛选标签 */
        .filter-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border-light);}
        .filter-tabs a{flex:1;text-align:center;padding:10px 0;font-size:13px;color:var(--caramel);text-decoration:none;border-bottom:3px solid transparent;}
        .filter-tabs a.active{color:var(--gold-dark);border-bottom-color:var(--gold-dark);font-weight:600;}

        /* 消息列表 */
        .msg-item{background:var(--warm-white);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light);display:flex;align-items:flex-start;gap:12px;}
        .msg-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
        .msg-icon.order{background:rgba(66,153,225,.12);}
        .msg-icon.system{background:rgba(200,150,92,.12);}
        .msg-icon.income{background:rgba(72,187,120,.12);}
        .msg-body{flex:1;min-width:0;}
        .msg-title{font-size:14px;font-weight:600;color:var(--espresso);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
        .msg-title .time{font-size:11px;color:var(--caramel);font-weight:400;}
        .msg-content{font-size:13px;color:var(--caramel);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
        .msg-unread .msg-title{color:var(--espresso);}
        .msg-unread .msg-title::before{content:'•';color:var(--rose);font-size:20px;margin-right:4px;vertical-align:middle;}

        .empty-state{padding:60px 0;text-align:center;color:var(--caramel);}
        .empty-state .icon{font-size:48px;margin-bottom:12px;}

        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--warm-white);display:flex;border-top:1px solid var(--border-light);z-index:100;}
        .bottom-nav a{flex:1;text-align:center;padding:12px 0;color:var(--caramel);text-decoration:none;font-size:13px;}
        .bottom-nav a.active{color:var(--gold-dark);font-weight:600;}
    </style>
</head>
<body>
    <div class="container" style="max-width:500px;padding-bottom:80px;">
        
        <!-- 顶部 -->
        <div class="page-header">
            <h1>💬 消息通知</h1>
            <a th:href="@{/rider/markRead(messageId=0)}" th:if="${unreadCount > 0}">全部标为已读</a>
        </div>

        <!-- 与客人对话 -->
        <div th:if="${recentChats != null && !recentChats.isEmpty()}" style="margin-bottom:20px;">
            <div style="font-size:14px;font-weight:600;color:var(--espresso);margin-bottom:10px;">💬 与客人对话</div>
            <a th:each="chat : ${recentChats}" th:href="@{/rider/chat(orderId=${chat.orderId})}"
               style="display:block;background:var(--warm-white);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light);text-decoration:none;color:var(--espresso);">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <span style="font-weight:600;" th:text="'订单 #' + ${chat.orderId}"></span>
                    <span style="font-size:11px;color:var(--caramel);" th:text="${#strings.substring(chat.createTime, 0, 16)}"></span>
                </div>
                <div style="font-size:13px;color:var(--caramel);margin-top:4px;" th:text="${chat.senderName} + ': ' + ${chat.content}">最新消息</div>
            </a>
        </div>

        <!-- 筛选标签 -->
        <div class="filter-tabs">
            <a th:href="@{/rider/messages(type='all')}" th:classappend="${currentType=='all'?'active':''}">全部</a>
            <a th:href="@{/rider/messages(type='order')}" th:classappend="${currentType=='order'?'active':''}">订单</a>
            <a th:href="@{/rider/messages(type='system')}" th:classappend="${currentType=='system'?'active':''}">系统</a>
            <a th:href="@{/rider/messages(type='income')}" th:classappend="${currentType=='income'?'active':''}">收入</a>
        </div>

        <!-- 消息列表 -->
        <div th:if="${messages.data == null or messages.data.isEmpty()}" class="empty-state">
            <div class="icon">📭</div>
            <p>暂无消息</p>
        </div>
        <div th:each="msg : ${messages.data}" class="msg-item" th:classappend="${msg.isRead == 0}?'msg-unread':''">
            <div class="msg-icon" th:classappend="${msg.type=='order'?'order':(msg.type=='system'?'system':'income')}"
                 th:text="${msg.type=='order'?'📦':(msg.type=='system'?'📢':'💰')}"></div>
            <div class="msg-body">
                <div class="msg-title">
                    <span th:text="${msg.title}">消息标题</span>
                    <span class="time" th:text="${#strings.substring(msg.createTime,0,16)}">2026-06-01 10:00</span>
                </div>
                <div class="msg-content" th:text="${msg.content}">消息内容</div>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
        <a th:href="@{/rider/index}">🏠 首页</a>
        <a th:href="@{/rider/income}">💰 收入</a>
        <a th:href="@{/rider/messages}" class="active">💬 消息<span th:if="${unreadCount > 0}" style="background:var(--rose);color:white;font-size:10px;min-width:16px;height:16px;line-height:16px;border-radius:8px;display:inline-block;text-align:center;margin-left:4px;" th:text="${unreadCount}"></span></a>
        <a th:href="@{/rider/profile}">👤 我的</a>
    </div>
</body>
</html>
