<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <title>订单详情 — CakeShop</title>
    <link rel="icon" type="image/jpeg" href="/images/logo.jpg">
    <link type="text/css" rel="stylesheet" href="/css/style.css">
    <style>
        .status-badge{display:inline-block;padding:4px 12px;border-radius:9999px;font-size:12px;font-weight:600}
        .s2{background:#fef3c7;color:#a06b35}.s3{background:rgba(66,153,225,.12);color:#3182ce}
        .s4{background:rgba(66,153,225,.12);color:#3182ce}.s5{background:rgba(72,187,120,.12);color:#38a169}
        .s6{background:rgba(212,160,154,.15);color:#a0534a}
    </style>
</head>
<body>
    <div class="container" style="max-width:600px;padding-bottom:80px;">
        <div style="padding:16px 0"><a th:href="@{/rider/index}" class="btn btn-sm btn-secondary">← 返回</a></div>

        <!-- 订单信息 -->
        <div class="card" style="padding:20px;margin-bottom:14px;">
            <h3 style="font-family:Georgia,serif;font-size:15px;color:var(--gold-dark);margin-bottom:10px;">📋 订单信息</h3>
            <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px">
                <span style="color:var(--caramel)">订单号</span><span th:text="${order.id}"></span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px">
                <span style="color:var(--caramel)">时间</span><span th:text="${order.datetime}"></span>
            </div>
            <div th:if="${order.deliveryTime != null and !order.deliveryTime.isEmpty()}" style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px">
                <span style="color:var(--caramel)">期望送达</span><span th:text="${order.deliveryTime}"></span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px">
                <span style="color:var(--caramel)">状态</span>
                <span class="status-badge" th:classappend="'s'+${order.status}">
                    <span th:if="${order.status == 2}">待接单</span>
                    <span th:if="${order.status == 3}">待取货</span>
                    <span th:if="${order.status == 4}">配送中</span>
                    <span th:if="${order.status == 5}">已完成</span>
                    <span th:if="${order.status == 6}">已取消</span>
                </span>
            </div>
        </div>

        <!-- 收货信息 -->
        <div class="card" style="padding:20px;margin-bottom:14px;">
            <h3 style="font-family:Georgia,serif;font-size:15px;color:var(--gold-dark);margin-bottom:10px;">📍 收货信息</h3>
            <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px">
                <span style="color:var(--caramel)">收货人</span><span th:text="${order.name}"></span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px">
                <span style="color:var(--caramel)">电话</span><span th:text="${order.phone}"></span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px">
                <span style="color:var(--caramel)">地址</span><span th:text="${order.address}"></span>
            </div>
            <div th:if="${order.commission > 0}" style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px">
                <span style="color:var(--caramel)">配送费</span>
                <span style="font-weight:600;" th:text="'¥' + ${#numbers.formatDecimal(order.commission, 0, 2)}"></span>
            </div>
        </div>

        <!-- 商品明细 -->
        <div class="card" style="padding:20px;">
            <h3 style="font-family:Georgia,serif;font-size:15px;color:var(--gold-dark);margin-bottom:10px;">🎂 商品明细</h3>
            <div th:if="${items != null and !items.isEmpty()}">
                <div th:each="item : ${items}" style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px solid var(--border-light)">
                    <span th:text="'商品#' + ${item.goodsId}"></span>
                    <span th:text="'×' + ${item.amount}"></span>
                    <span th:text="'¥' + ${#numbers.formatDecimal(item.price, 0, 2)}"></span>
                </div>
            </div>
            <div th:if="${items == null or items.isEmpty()}" style="text-align:center;padding:20px;color:var(--caramel);">暂无商品明细</div>
            <div style="display:flex;justify-content:space-between;padding:10px 0 0;font-weight:700;border-top:1px solid var(--border-light);margin-top:6px;">
                <span style="color:var(--caramel)">合计</span>
                <span style="font-family:Georgia,serif;font-size:18px;color:var(--espresso)" th:text="'¥' + ${#numbers.formatDecimal(order.total, 0, 2)}"></span>
            </div>
        </div>
    </div>
</body>
</html>
