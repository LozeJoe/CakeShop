<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>个人中心 — CakeShop</title>
    <link rel="icon" type="image/jpeg" th:href="@{/images/logo.jpg}">
    <link type="text/css" rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .pw-strength-bar{height:4px;border-radius:2px;margin-top:4px;transition:all .3s;background:#eee;}
        .pw-strength-bar.weak{width:33%;background:#e74c3c;}
        .pw-strength-bar.medium{width:66%;background:#f39c12;}
        .pw-strength-bar.strong{width:100%;background:#27ae60;}
        .pw-hint{font-size:12px;color:#999;margin-top:2px;}
        .pw-hint.valid{color:#27ae60;}
        .pw-hint.invalid{color:#e74c3c;}
        .form-row{display:flex;gap:8px;}
        .form-row .form-group{flex:1;}
        select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;box-sizing:border-box;}
    </style>
</head>
<body>
    <div th:replace="user/commons::topbar"></div>
    <div th:replace="user/commons::floathome"></div>

    <div class="container" style="max-width:560px;">
        <div class="hero" style="padding:32px 0 24px;text-align:left;">
            <h1 style="font-size:36px;">👤 个人中心</h1>
        </div>

        <div class="card" style="padding:32px;">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/user/editProfile}" method="post" onsubmit="return validateForm()">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" th:value="${user.username}" disabled>
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" name="name" th:value="${user.name}">
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="text" name="phone" id="phone" th:value="${user.phone}" maxlength="11" oninput="checkPhone()">
                    <div class="field-error" id="phoneError" style="color:#e74c3c;font-size:12px;display:none;">手机号必须为11位数字且以1开头</div>
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" name="email" id="email" th:value="${user.email}">
                    <div class="field-error" id="emailError" style="color:#e74c3c;font-size:12px;display:none;">请输入有效的邮箱地址</div>
                </div>
                <div class="form-group">
                    <label>地址</label>
                    <div class="form-row">
                        <div class="form-group">
                            <select id="province" onchange="updateCities()">
                                <option value="">— 请选择省份 —</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <select id="city" onchange="updateDistricts()">
                                <option value="">— 请选择城市 —</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <select id="district" onchange="updateAddress()">
                                <option value="">— 请选择区/县 —</option>
                            </select>
                        </div>
                    </div>
                    <input type="hidden" name="address" id="address" th:value="${user.address}">
                </div>

                <hr style="margin:24px 0;border:none;border-top:1px solid #eee;">

                <h3 style="font-size:16px;margin-bottom:16px;">🔒 修改密码</h3>
                <p style="color:#999;font-size:13px;margin-bottom:16px;">如不修改密码，请留空以下字段</p>

                <div class="form-group">
                    <label>当前密码</label>
                    <input type="password" name="oldPassword" id="oldPassword" placeholder="输入当前密码以修改密码">
                </div>
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" name="newPassword" id="newPassword" placeholder="留空则不修改" onkeyup="checkPwStrength()">
                    <div class="pw-strength-bar" id="pwBar"></div>
                    <div class="pw-hint" id="pwLower">✓ 包含小写字母</div>
                    <div class="pw-hint" id="pwUpper">✓ 包含大写字母</div>
                    <div class="pw-hint" id="pwDigit">✓ 包含数字</div>
                    <div class="pw-hint" id="pwSymbol">✓ 包含特殊字符</div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">💾 保存修改</button>
            </form>
        </div>
    </div>

    <div th:replace="user/commons::footbar"></div>

        var provinceSelect = document.getElementById('province');
        var citySelect = document.getElementById('city');
        var districtSelect = document.getElementById('district');
        var addressHidden = document.getElementById('address');

        // 初始化省份
        (function initProvinces() {
            var provinces = Object.keys(regions);
            provinces.sort();
            for (var i = 0; i < provinces.length; i++) {
                var opt = document.createElement('option');
                opt.value = provinces[i];
                opt.text = provinces[i];
                provinceSelect.appendChild(opt);
            }
            // 尝试从现有地址反选
            var currentAddr = addressHidden.value;
            if (currentAddr) {
                var parts = currentAddr.split('/');
                if (parts.length >= 1 && parts[0]) {
                    provinceSelect.value = parts[0];
                    updateCities(function() {
                        if (parts.length >= 2 && parts[1]) {
                            citySelect.value = parts[1];
                            updateDistricts(function() {
                                if (parts.length >= 3 && parts[2]) {
                                    districtSelect.value = parts[2];
                                }
                            });
                        }
                    });
                }
            }
        })();

        function updateCities(callback) {
            var p = provinceSelect.value;
            citySelect.innerHTML = '<option value="">— 请选择城市 —</option>';
            districtSelect.innerHTML = '<option value="">— 请选择区/县 —</option>';
            if (!p) { updateAddress(); if(callback) callback(); return; }
            var cities = Object.keys(regions[p]);
            cities.sort();
            for (var i = 0; i < cities.length; i++) {
                var opt = document.createElement('option');
                opt.value = cities[i];
                opt.text = cities[i];
                citySelect.appendChild(opt);
            }
            updateAddress();
            if(callback) callback();
        }

        function updateDistricts(callback) {
            districtSelect.innerHTML = '<option value="">— 请选择区/县 —</option>';
            var p = provinceSelect.value;
            var c = citySelect.value;
            if (!p || !c) { updateAddress(); if(callback) callback(); return; }
            var districts = regions[p][c];
            if (districts && districts.length > 0) {
                for (var i = 0; i < districts.length; i++) {
                    var opt = document.createElement('option');
                    opt.value = districts[i];
                    opt.text = districts[i];
                    districtSelect.appendChild(opt);
                }
            }
            updateAddress();
            if(callback) callback();
        }

        function updateAddress() {
            var p = provinceSelect.value;
            var c = citySelect.value;
            var d = districtSelect.value;
            var parts = [];
            if (p) parts.push(p);
            if (c) parts.push(c);
            if (d) parts.push(d);
            addressHidden.value = parts.join('/');
        }

        // ============== 密码强度检查 ==============
        function checkPwStrength() {
            var pw = document.getElementById('newPassword').value;
            if (!pw) {
                document.getElementById('pwBar').className = 'pw-strength-bar';
                setHint('pwLower', true); setHint('pwUpper', true);
                setHint('pwDigit', true); setHint('pwSymbol', true);
                return;
            }
            setHint('pwLower', /[a-z]/.test(pw));
            setHint('pwUpper', /[A-Z]/.test(pw));
            setHint('pwDigit', /\d/.test(pw));
            setHint('pwSymbol', /[^a-zA-Z\d]/.test(pw));
            var bar = document.getElementById('pwBar');
            var score = (/[a-z]/.test(pw)?1:0) + (/[A-Z]/.test(pw)?1:0) + (/\d/.test(pw)?1:0) + (/[^a-zA-Z\d]/.test(pw)?1:0) + (pw.length>=8?1:0);
            bar.className = 'pw-strength-bar';
            if (score <= 2) bar.classList.add('weak');
            else if (score <= 3) bar.classList.add('medium');
            else bar.classList.add('strong');
        }

        function setHint(id, valid) {
            var el = document.getElementById(id);
            el.className = 'pw-hint ' + (valid ? 'valid' : 'invalid');
        }

        // ============== 手机号检查 ==============
        function checkPhone() {
            var err = document.getElementById('phoneError');
            var v = document.getElementById('phone').value;
            if (v.length > 0 && !/^1\d{10}$/.test(v)) {
                err.style.display = 'block';
            } else {
                err.style.display = 'none';
            }
        }

        // ============== 表单提交验证 ==============
        function validateForm() {
            var newPw = document.getElementById('newPassword').value;
            var oldPw = document.getElementById('oldPassword').value;
            if (newPw) {
                if (!oldPw) {
                    alert('请输入当前密码才能修改密码');
                    return false;
                }
                if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^a-zA-Z\d]).{8,}$/.test(newPw)) {
                    alert('新密码必须包含大写字母、小写字母、数字和特殊字符，且不少于8位');
                    return false;
                }
            }
            var phone = document.getElementById('phone').value;
            if (phone && !/^1\d{10}$/.test(phone)) {
                document.getElementById('phoneError').style.display = 'block';
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
